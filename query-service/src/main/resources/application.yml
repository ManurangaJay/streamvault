server:
  port: 8082

spring:
  application:
    name: query-service

  datasource:
    url: jdbc:postgresql://localhost:5432/streamvault_query
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true

  cloud:
    function:
      definition: transactionEvents;accountEvents
    stream:
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          transactionEvents-in-0:
            consumer:
              startOffset: earliest
              ack-mode: MANUAL
          accountEvents-in-0:
            consumer:
              startOffset: earliest
              ack-mode: MANUAL

      bindings:
        transactionEvents-in-0:
          destination: transaction.events
          group: query-service-group
        accountEvents-in-0:
          destination: account.events
          group: query-service-group

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus